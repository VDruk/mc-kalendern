                <span>Tipsa om evenemang</span>
            </button>
            <button class="favorites-btn" id="favoritesBtn">
                <span>❤️</span>
                <span>Mina evenemang</span>
                <span class="favorites-badge" id="favoritesBadge">0</span>
            </button>
        </div>
    </header>

    <!-- Upcoming Banner -->
    <div class="upcoming-banner" id="upcomingBanner" style="display: none;">
        <div class="upcoming-label">Nästa evenemang</div>
        <h2 id="upcomingTitle"></h2>
        <p id="upcomingLocation"></p>
        <div class="countdown" id="upcomingCountdown"></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-pills">
            <button class="pill active" data-filter="alla">Alla</button>
            <button class="pill" data-filter="mässa">Mässa</button>
            <button class="pill" data-filter="träff">Träff</button>
            <button class="pill" data-filter="show">Show</button>
            <button class="pill" data-filter="körning">Körning</button>
            <button class="pill" data-filter="tur">Tur</button>
            <button class="pill" data-filter="racing">Racing</button>
        </div>
        <div class="filter-separator"></div>
        <div class="time-toggle">
            <button class="pill active" data-time="kommande">Kommande</button>
            <button class="pill" data-time="alla">Alla</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="events-grid" id="eventsGrid"></div>
    </div>

    <!-- Footer -->
    <footer>
        <strong>MC Kalendern</strong> - Svenska MC-evenemang samlat på ett ställe
        <br>
        Ett projekt av <strong>druk.se</strong>
    </footer>

    <!-- Favorites Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="favorites-drawer" id="favoritesDraw">
        <div class="drawer-header">
            <h2>Mina evenemang</h2>
            <button class="close-btn" id="closeDrawerBtn">✕</button>
        </div>
        <div class="drawer-content" id="drawerContent">
            <div class="empty-state">
                <div class="empty-state-icon">❤️</div>
                <div class="empty-state-text">
                    Lägg till evenemang till favoriter för att få dem här!
                </div>
            </div>
        </div>
        <div class="drawer-footer">
            <div class="reminder-label">Vill du bli påmind? Skriv din e-post:</div>
            <div class="reminder-input-group">
                <input type="email" class="reminder-input" id="reminderEmail" placeholder="din@epost.se">
                <button class="btn-reminder" id="reminderBtn">Påminn mig</button>
            </div>
        </div>
    </div>

    <!-- Submit Event Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2>Tipsa om evenemang</h2>
                <button class="close-btn" id="closeModalBtn">✕</button>
            </div>
            <form id="eventForm" class="modal-body">
                <div class="form-group">
                    <label class="form-label">
                        Eventnamn <span class="required">*</span>
                    </label>
                    <input type="text" class="form-input" id="formName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Startdatum <span class="required">*</span>
                    </label>
                    <input type="date" class="form-input" id="formDateStart" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Slutdatum</label>
                    <input type="date" class="form-input" id="formDateEnd">
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Plats <span class="required">*</span>
                    </label>
                    <input type="text" class="form-input" id="formLocation" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Typ</label>
                    <select class="form-select" id="formType">
                        <option value="">Välj typ</option>
                        <option value="mässa">Mässa</option>
                        <option value="träff">Träff</option>
                        <option value="show">Show</option>
                        <option value="körning">Körning</option>
                        <option value="tur">Tur</option>
                        <option value="racing">Racing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Arrangör</label>
                    <input type="text" class="form-input" id="formOrganizer">
                </div>
                <div class="form-group">
                    <label class="form-label">Länk</label>
                    <input type="url" class="form-input" id="formLink">
                </div>
                <div class="form-group">
                    <label class="form-label">Beskrivning</label>
                    <textarea class="form-textarea" id="formDescription"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Din e-post</label>
                    <input type="email" class="form-input" id="formEmail">
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelBtn">Avbryt</button>
                <button class="btn-submit" id="submitFormBtn">Skicka tips</button>
            </div>
        </div>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage" style="display: none;">
        Tack för ditt tips!
    </div>

    <!-- Scripts -->
    <script src="events.js"></script>
    <script>
        // Months translation
        const monthNames = [
            'Januari', 'Februari', 'Mars', 'April', 'Maj', 'Juni',
            'Juli', 'Augusti', 'September', 'Oktober', 'November', 'December'
        ];

        const monthShort = [
            'Jan', 'Feb', 'Mar', 'Apr', 'Maj', 'Jun',
            'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec'
        ];

        const typeColors = {
            'mässa': '#0066cc',
            'träff': '#00aa66',
            'show': '#dd0066',
            'körning': '#e85d04',
            'tur': '#7722cc',
            'racing': '#dd0000'
        };

        // State
        let allEvents = [];
        let favorites = JSON.parse(localStorage.getItem('mc_favorites')) || [];
        let currentFilter = 'alla';
        let currentTimeFilter = 'kommande';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadEvents();
            setupEventListeners();
            renderEvents();
            updateFavoritesUI();
            updateUpcomingBanner();
        });

        function loadEvents() {
            // Events loaded from events.js (EVENTS_DATA object)
            if (typeof EVENTS_DATA !== 'undefined' && EVENTS_DATA.events) {
                allEvents = EVENTS_DATA.events.map((e, i) => ({
                    ...e,
                    id: e.id || i
                }));
            }
        }

        function setupEventListeners() {
            // Filter pills
            document.querySelectorAll('.filter-pills .pill').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-pills .pill').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderEvents();
                });
            });

            // Time toggle
            document.querySelectorAll('.time-toggle .pill').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.time-toggle .pill').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentTimeFilter = e.target.dataset.time;
                    renderEvents();
                });
            });

            // Modal
            const modalOverlay = document.getElementById('modalOverlay');
            const submitBtn = document.getElementById('submitBtn');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const submitFormBtn = document.getElementById('submitFormBtn');

            submitBtn.addEventListener('click', () => {
                modalOverlay.classList.add('active');
                document.getElementById('eventForm').reset();
            });

            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('active');
            });

            cancelBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('active');
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                }
            });

            submitFormBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const name = document.getElementById('formName').value.trim();
                const dateStart = document.getElementById('formDateStart').value;
                const dateEnd = document.getElementById('formDateEnd').value;
                const location = document.getElementById('formLocation').value.trim();

                if (!name || !dateStart || !location) {
                    alert('Vänligen fyll i alla obligatoriska fält (markerade med *)');
                    return;
                }

                const newEvent = {
                    id: Date.now(),
                    name: name,
                    date: dateStart,
                    dateEnd: dateEnd || dateStart,
                    location: location,
                    type: document.getElementById('formType').value || '',
                    organizer: document.getElementById('formOrganizer').value.trim(),
                    description: document.getElementById('formDescription').value.trim(),
                    link: document.getElementById('formLink').value.trim(),
                    region: ''
                };

                allEvents.push(newEvent);
                allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

                showSuccessMessage();
                modalOverlay.classList.remove('active');
                renderEvents();
                updateUpcomingBanner();
            });

            // Favorites drawer
            const drawerOverlay = document.getElementById('drawerOverlay');
            const favoritesDraw = document.getElementById('favoritesDraw');
            const favoritesBtn = document.getElementById('favoritesBtn');
            const closeDrawerBtn = document.getElementById('closeDrawerBtn');

            favoritesBtn.addEventListener('click', () => {
                favoritesDraw.classList.add('active');
                drawerOverlay.classList.add('active');
            });

            closeDrawerBtn.addEventListener('click', () => {
                favoritesDraw.classList.remove('active');
                drawerOverlay.classList.remove('active');
            });

            drawerOverlay.addEventListener('click', () => {
                favoritesDraw.classList.remove('active');
                drawerOverlay.classList.remove('active');
            });

            // Reminder button
            document.getElementById('reminderBtn').addEventListener('click', () => {
                const email = document.getElementById('reminderEmail').value.trim();
                if (!email) {
                    alert('Vänligen skriv din e-post');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('Vänligen skriv en giltig e-postadress');
                    return;
                }
                // Save to localStorage
                const reminders = JSON.parse(localStorage.getItem('mc_reminders')) || [];
                if (!reminders.includes(email)) {
                    reminders.push(email);
                    localStorage.setItem('mc_reminders', JSON.stringify(reminders));
                }
                showSuccessMessage('E-postadressen sparad!');
                document.getElementById('reminderEmail').value = '';
            });
        }

        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            grid.innerHTML = '';

            let filtered = allEvents.filter(event => {
                const matchesType = currentFilter === 'alla' || (event.type || '').toLowerCase() === currentFilter;
                const eventDate = new Date(event.date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const isFuture = eventDate >= today;
                const matchesTime = currentTimeFilter === 'alla' || isFuture;
                return matchesType && matchesTime;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">Inga evenemang hittades</p>';
                return;
            }

            // Group by month
            const grouped = {};
            filtered.forEach(event => {
                const date = new Date(event.date);
                const month = monthNames[date.getMonth()];
                const year = date.getFullYear();
                const key = `${year}-${date.getMonth()}`;
                if (!grouped[key]) {
                    grouped[key] = { month, year, events: [] };
                }
                grouped[key].events.push(event);
            });

            let isFirstMonth = true;
            Object.values(grouped).forEach(group => {
                if (!isFirstMonth) {
                    const divider = document.createElement('div');
                    divider.className = 'month-divider';
                    divider.textContent = `${group.month} ${group.year}`;
                    grid.appendChild(divider);
                } else {
                    const divider = document.createElement('div');
                    divider.className = 'month-divider';
                    divider.textContent = `${group.month} ${group.year}`;
                    grid.appendChild(divider);
                    isFirstMonth = false;
                }

                group.events.forEach(event => {
                    grid.appendChild(createEventCard(event));
                });
            });
        }

        function createEventCard(event) {
            const card = document.createElement('div');
            card.className = 'event-card';

            const eventDate = new Date(event.date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const isPast = eventDate < today;

            if (isPast) {
                card.classList.add('past');
            }

            if (favorites.includes(event.id)) {
                card.classList.add('favorited');
            }

            const dateStr = eventDate.getDate();
            const monthStr = monthShort[eventDate.getMonth()];

            let dateEndStr = '';
            if (event.dateEnd && event.dateEnd !== event.date) {
                const endDate = new Date(event.dateEnd);
                dateEndStr = ` - ${endDate.getDate()} ${monthShort[endDate.getMonth()]}`;
            }

            const dateRange = `${dateStr} ${monthStr}${dateEndStr} ${eventDate.getFullYear()}`;

            const typeEmojis = {
                'mässa': '🏪',
                'träff': '🤝',
                'show': '🌟',
                'körning': '🏍️',
                'tur': '🛣️',
                'racing': '🏁'
            };
            const typeLower = (event.type || '').toLowerCase();
            const emoji = typeEmojis[typeLower] || '🏍️';

            const imageStyle = event.image ? `background-image: url('${event.image}')` : '';

            card.innerHTML = `
                <div class="card-image ${typeLower}" style="${imageStyle}"></div>
                <div class="card-badges">
                    <div class="date-badge">
                        ${dateStr}<br>${monthStr}
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: start;">
                        <div class="type-badge ${typeLower}">${event.type || 'Event'}</div>
                        <button class="favorite-btn ${favorites.includes(event.id) ? 'active' : ''}">
                            ${favorites.includes(event.id) ? '❤️' : '🤍'}
                        </button>
                    </div>
                </div>
                <div class="card-content">
                    <div class="card-title">${event.name}</div>
                    <div class="card-date">${dateRange}</div>
                    <div class="card-location">📍 ${event.location}</div>
                    ${event.description ? `<div class="card-description">${event.description}</div>` : ''}
                    ${event.organizer ? `<div class="card-organizer">Arrangör: ${event.organizer}</div>` : ''}
                    ${event.link ? `<a href="${event.link}" target="_blank" class="card-link">Mer info →</a>` : ''}
                </div>
            `;

            const favBtn = card.querySelector('.favorite-btn');
            favBtn.addEventListener('click', (e) => {
                e.preventDefault();
                toggleFavorite(event.id);
                renderEvents();
                updateFavoritesUI();
            });

            return card;
        }

        function toggleFavorite(eventId) {
            const index = favorites.indexOf(eventId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(eventId);
            }
            localStorage.setItem('mc_favorites', JSON.stringify(favorites));
        }

        function updateFavoritesUI() {
            const badge = document.getElementById('favoritesBadge');
            const drawer = document.getElementById('drawerContent');

            if (favorites.length > 0) {
                badge.textContent = favorites.length;
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }

            if (favorites.length === 0) {
                drawer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❤️</div>
                        <div class="empty-state-text">
                            Lägg till evenemang till favoriter för att få dem här!
                        </div>
                    </div>
                `;
            } else {
                drawer.innerHTML = '';
                favorites.forEach(fav => {
                    const event = allEvents.find(e => e.id === fav);
                    if (event) {
                        const item = document.createElement('div');
                        item.className = 'favorite-item';

                        const date = new Date(event.date);
                        const dateStr = `${date.getDate()} ${monthShort[date.getMonth()]}`;

                        item.innerHTML = `
                            <div class="favorite-item-content">
                                <div class="favorite-item-title">${event.name}</div>
                                <div class="favorite-item-date">${dateStr} · ${event.location}</div>
                            </div>
                            <button class="remove-btn">✕</button>
                        `;

                        item.querySelector('.remove-btn').addEventListener('click', () => {
                            toggleFavorite(event.id);
                            updateFavoritesUI();
                            renderEvents();
                        });

                        drawer.appendChild(item);
                    }
                });
            }
        }

        function updateUpcomingBanner() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const upcoming = allEvents.find(e => new Date(e.date) >= today);

            if (upcoming) {
                const banner = document.getElementById('upcomingBanner');
                const title = document.getElementById('upcomingTitle');
                const location = document.getElementById('upcomingLocation');
                const countdown = document.getElementById('upcomingCountdown');

                title.textContent = upcoming.name;
                location.textContent = upcoming.location;

                const eventDate = new Date(upcoming.date);
                const daysLeft = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
                countdown.textContent = `${daysLeft} dagar kvar`;

                banner.style.display = 'block';
            }
        }

        function showSuccessMessage(msg = 'Tack för ditt tips!') {
            const msgEl = document.getElementById('successMessage');
            msgEl.textContent = msg;
            msgEl.style.display = 'block';
            msgEl.classList.remove('hide');
            setTimeout(() => {
                msgEl.classList.add('hide');
                setTimeout(() => {
                    msgEl.style.display = 'none';
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
